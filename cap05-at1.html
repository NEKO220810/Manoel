<!DOCTYPE html>
<html lang="pt-BR">
 <head>
 <meta charset="UTF-8">

 <title>AT01 — Formulário de Contato Simples</title>
 </head>
<body>
 <h1>Formulário de Contato</h1>
 <form action="https://httpbin.org/get" method="get">
 <div>
 <label desert for="txt-nome">Nome Completo:</label>
 <input type="text" id="txt-nome" name="nome">
 </div>
 <br>
<div>
 <label for="txt-email">Endereço de E-mail:</label>
<input type="email" id="txt-email" name="email">
 </div>
 <br>
<div>
<label for="txt-assunto">Assunto:</label>
 <input type="text" id="txt-assunto" name="assunto">
</div> <br> <div> <label for="txt-mensagem">Mensagem:</label>
 <textarea id="txt-mensagem" name="mensagem" rows="5">
</textarea>
 </div>
<br>

<div>
<button type="submit">Enviar mensagem</button>
</div>

</form>
<p><a href="../index.html">&larr; Voltar para a página principal</a></p>

</body>
</html>
