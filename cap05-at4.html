<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT04 — Inscrição em Evento com Campos Avançados</title>
</head>
<body>

    
    <h1>Inscrição — Semana de Tecnologia IFAL</h1>

    <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">

        <input type="hidden" name="edic_ao" value="2026">

        <fieldset>
            <legend>Identificação do Participante</legend>
            <div>
                <label for="txt-nome">Nome completo:</label>
                <input type="text" id="txt-nome" name="nome" required>
            </div>
            <br>

            <div>
                <label for="txt-email">E-mail institucional:</label>
                <input type="email" id="txt-email" name="email" required>
            </div>
            <br>

            <div>
                <label for="txt-cidade">Cidade de origem:</label>
                <input type="text" id="txt-cidade" name="cidade" list="cidades-alagoas">
               
                <datalist id="cidades-alagoas">
                    <option value="Maceió">
                    <option value="Arapiraca">
                    <option value="Palmeira dos Índios">
                    <option value="Rio Largo">
                    <option value="Penedo">
                    <option value="União dos Palmares">
                    <option value="Delmiro Gouveia">
                    <option value="Santana do Ipanema">
                </datalist>
            </div>
            <br>

            <div>
                <label for="file-foto">Foto para crachá:</label>
                <input type="file" id="file-foto" name="foto" accept="image/jpeg, image/png" aria-describedby="instrucao-foto">
                <br>
                <small id="instrucao-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>
            </div>
        </fieldset>
        <br>

        <fieldset>
            <legend>Preferências para o Evento</legend>

            <div>
                <label for="date-chegada">Data e hora preferida para chegada:</label>
                <input type="datetime-local" id="date-chegada" name="chegada">
            </div>
            <br>

            <div>
                <label for="experiencia">
                    Nível de experiência em programação: <span id="valor-experiencia">5</span>/10
                </label>
                <br>
                <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5"
                       oninput="document.getElementById('valor-experiencia').textContent = this.value">
            </div>
            <br>

            <div>
                <label for="color-camiseta">Cor de preferência para a camiseta:</label>
                <input type="color" id="color-camiseta" name="cor_camiseta" value="#1a73e8">
            </div>
            <br>

            <div>
                <label for="sel-oficinas">Oficinas de interesse:</label>
                <br>
                <select id="sel-oficinas" name="oficinas[]" multiple size="4" aria-describedby="instrucao-oficinas">
                    <option value="web">Desenvolvimento Web com HTML/CSS</option>
                    <option value="js">Programação JavaScript Avançada</option>
                    <option value="banco">Modelagem de Banco de Dados</option>
                    <option value="ux">Design de Interface e UX</option>
                    <option value="segurança">Introdução a Cibersegurança</option>
                </select>
                <br>
                <small id="instrucao-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
            </div>
        </fieldset>
        <br>

        <div>
            <button type="submit">Confirmar inscrição</button>
        </div>

    </form>
   
<p><a href="index.html">&larr; Voltar para a página principal</a></p>
   
</body>
   
</html>
